# render.yaml — Configuración de despliegue automático en Render.com
# Render detecta este archivo y configura el servicio automáticamente.

services:
  - type: web
    name: music-downloader
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get update && apt-get install -y ffmpeg || true
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: SPOTIFY_CLIENT_ID
        sync: false      # Se configura manualmente en el dashboard
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: DEEZER_ARL
        sync: false
