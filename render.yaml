services:
  - type: web
    name: musicdownloader-web
    env: python
    buildCommand: bash build.sh
    startCommand: gunicorn web_app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: DEEZER_ARL
        sync: false
      - key: SLSKD_API_URL
        value: http://localhost:5030
      - key: SLSKD_API_KEY
        sync: false
      - key: JOB_TTL_SECONDS
        value: "21600"
      - key: MAX_TRACKS_PER_JOB
        value: "250"
